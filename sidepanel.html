<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Spotify Song Notes</title>
  </head>
  <body>
    <main class="app">
      <section class="song">
        <div id="artwork" class="artwork">No art</div>
        <div>
          <div id="songTitle" class="title">Song not detected</div>
          <div id="songArtists" class="artists">Open Spotify Web Player and start playback.</div>
        </div>
      </section>

      <section class="section">
        <textarea id="noteBody" placeholder="Write a plain-text note for this song"></textarea>
        <label class="row">
          <input id="sharedToggle" type="checkbox" />
          <span>Share this note</span>
        </label>
        <div class="row wrap">
          <button id="saveButton" class="primary">Save</button>
          <button id="clearButton">Clear</button>
          <button id="sharedButton">Shared</button>
          <button id="syncButton">Sync</button>
          <span class="spacer"></span>
          <span id="saveStatus" class="status"></span>
        </div>
      </section>

      <section id="sharedSection" class="section hidden">
        <div class="row">
          <h2>Shared notes</h2>
          <span class="spacer"></span>
          <button id="closeShared">Close</button>
        </div>
        <div id="sharedList" class="list"></div>
      </section>
    </main>

    <div id="modalBackdrop" class="modal-backdrop hidden">
      <div class="modal">
        <div id="modalTitle" class="title">Sync conflict</div>
        <p id="modalBody" class="muted"></p>
        <div id="modalPreview" class="note-card hidden"><pre></pre></div>
        <div id="modalActions" class="row wrap"></div>
      </div>
    </div>

    <script type="module" src="/src/sidepanel.ts"></script>
  </body>
</html>
