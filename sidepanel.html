<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Spotify Song Notes</title>
  </head>
  <body>
    <main class="app">
      <header class="song">
        <div id="artwork" class="artwork">No art</div>
        <div class="song-meta">
          <div id="songTitle" class="title">Song not detected</div>
          <div id="songArtists" class="artists">Open Spotify Web Player and start playback.</div>
        </div>
        <div class="row header-actions">
          <button id="forumButton" class="small" aria-pressed="false">Forum</button>
          <button id="myNotesButton" class="small" aria-pressed="false">My Notes</button>
        </div>
      </header>

      <nav id="viewNav" class="seg" role="tablist" aria-label="View">
        <button id="tabNote" role="tab" aria-selected="true" aria-controls="editorView">My note</button>
        <button id="tabShared" role="tab" aria-selected="false" aria-controls="sharedView">Shared</button>
      </nav>

      <section id="editorView" class="view editor" role="tabpanel">
        <textarea id="noteBody" placeholder="Write a note for this song…"></textarea>
        <div class="editor-footer">
          <label class="row toggle">
            <input id="sharedToggle" type="checkbox" />
            <span>Share this note</span>
          </label>
          <div class="row actions">
            <button id="clearButton" class="small">Clear</button>
            <span class="spacer"></span>
            <span id="saveStatus" class="status"></span>
          </div>
        </div>
      </section>

      <section id="sharedView" class="view hidden" role="tabpanel" aria-hidden="true">
        <div class="row">
          <button id="syncButton" class="small primary">Pull all into my note</button>
          <span class="spacer"></span>
          <span id="sharedStatus" class="status"></span>
        </div>
        <div id="sharedList" class="list"></div>
      </section>

      <section id="forumView" class="view hidden" role="tabpanel" aria-hidden="true">
        <div class="row">
          <strong id="forumTitle">Forum</strong>
          <span id="forumSubtitle" class="muted">Shared notes from everyone</span>
          <span class="spacer"></span>
          <span id="forumStatus" class="status"></span>
        </div>
        <div id="forumList" class="list">
          <div id="forumSentinel"></div>
        </div>
      </section>
    </main>

    <div id="modalBackdrop" class="modal-backdrop hidden">
      <div class="modal">
        <div id="modalTitle" class="title">Sync conflict</div>
        <p id="modalBody" class="muted"></p>
        <div id="modalPreview" class="note-card hidden"><pre></pre></div>
        <div id="modalActions" class="row wrap"></div>
      </div>
    </div>

    <script type="module" src="/src/sidepanel.ts"></script>
  </body>
</html>
